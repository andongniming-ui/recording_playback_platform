version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: arex-recorder-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: arex_recorder
      MYSQL_USER: arex
      MYSQL_PASSWORD: arex123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arex-recorder-backend
    environment:
      AR_DB_TYPE: mysql
      AR_DB_URL: mysql+aiomysql://arex:arex123@mysql:3306/arex_recorder
      AR_AREX_STORAGE_URL: http://host.docker.internal:8093
      AR_SECRET_KEY: please-change-this
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./ssh_keys:/app/ssh_keys

volumes:
  mysql_data:
