version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: arex-recorder-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: arex_recorder
      MYSQL_USER: arex
      MYSQL_PASSWORD: arex123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: arex-recorder-backend
    environment:
      AR_DB_TYPE: mysql
      AR_DB_URL: ${AR_DB_URL:-mysql+aiomysql://arex:arex123@db:3306/arex_recorder}
      AR_AREX_STORAGE_URL: ${AR_AREX_STORAGE_URL:-http://backend:8000}
      AR_AREX_AGENT_STORAGE_URL: ${AR_AREX_AGENT_STORAGE_URL:-http://host.docker.internal:8000}
      AR_AREX_AGENT_JAR_PATH: ${AR_AREX_AGENT_JAR_PATH:-/opt/arex/arex-agent.jar}
      AR_SECRET_KEY: ${AR_SECRET_KEY:-please-change-this-dev-only}
      AR_NLS_MYSQL_HOST: ${AR_NLS_MYSQL_HOST:-}
      AR_NLS_MYSQL_USER: ${AR_NLS_MYSQL_USER:-root}
      AR_NLS_MYSQL_PASSWORD: ${AR_NLS_MYSQL_PASSWORD:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./ssh_keys:/app/ssh_keys
      - ${AREX_AGENT_HOST_DIR:-./third_party/arex-agent}:/opt/arex:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arex-recorder-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
