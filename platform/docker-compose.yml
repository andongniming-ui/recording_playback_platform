version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: arex-recorder-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: arex_recorder
      MYSQL_USER: arex
      MYSQL_PASSWORD: arex123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: arex-recorder-backend
    environment:
      AR_DB_TYPE: mysql
      AR_DB_URL: mysql+aiomysql://arex:arex123@db:3306/arex_recorder
      AR_AREX_STORAGE_URL: http://localhost:8000
      AR_SECRET_KEY: please-change-this
      AR_NLS_MYSQL_HOST: 172.20.0.5
      AR_NLS_MYSQL_USER: root
      AR_NLS_MYSQL_PASSWORD: rootpass
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./ssh_keys:/app/ssh_keys
      - /home/test/arex-agent:/home/test/arex-agent:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arex-recorder-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
