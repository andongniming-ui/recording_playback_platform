server:
  port: 28081

spring:
  datasource:
    url: jdbc:mysql://localhost:3307/loan_alpha?useSSL=false&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

# Old system: CORRECT values
loan:
  variant:
    label: "old"
    age-check-mode: "INCLUSIVE"
    risk-grade-mode: "INCLUSIVE"
    max-debt-ratio: 0.50
    credit-adjust-factor: 0.80

logging:
  level:
    root: INFO
    com.arex.demo.loan: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
