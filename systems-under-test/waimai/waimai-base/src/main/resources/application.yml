server:
  port: 19091

spring:
  datasource:
    url: jdbc:mysql://localhost:3307/waimai_alpha?useSSL=false&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

waimai:
  variant:
    label: "base"
    enable-extra-fee: false
    extra-fee-rate: 0.0
    strict-risk: false
    risk-threshold: 80
    discount-generous: false
    discount-multiplier: 1.0
    enable-delivery-insurance: false
    delivery-insurance-rate: 0.0
    different-pricing: false
    pricing-adjust-rate: 0.0
    stock-pessimistic: false
    reconciliation-extra: false
    greeting: "欢迎光临"
    order-confirm-msg: "下单成功"
